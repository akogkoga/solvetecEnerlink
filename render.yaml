services:
  - type: web
    name: enerlink
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SQLITE_DB_PATH
        value: /opt/render/project/src/backend/storage/empresas.db
      - key: REDIS_ENABLED
        value: false
      - key: USE_CLOUDSCRAPER
        value: true
      - key: DEFAULT_TIMEOUT
        value: 15
      - key: ENRICHMENT_TIMEOUT
        value: 10
      - key: MAX_RETRIES
        value: 2
      - key: RETRY_BACKOFF_FACTOR
        value: 1.0
      - key: CACHE_TTL_SECONDS
        value: 1800
      - key: CACHE_MAX_ENTRIES
        value: 500
      - key: MAX_ENRICHMENT_CONCURRENT
        value: 3
      - key: MAX_ENRICHMENT_LEADS
        value: 6
      - key: ENRICHMENT_MODE
        value: balanced
      - key: CASADOSDADOS_API_KEY
        sync: false
